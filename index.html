<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  }
  #game-container {
    position: relative;
    display: inline-block;
  }
  canvas {
    display: block;
    border: 3px solid #3c3c50;
    border-radius: 4px;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  #ui-overlay.active {
    background: rgba(0,0,0,0.72);
    pointer-events: auto;
  }
  #game-over-text {
    color: #fff;
    font-size: 48px;
    font-weight: bold;
    display: none;
  }
  #final-score {
    color: #fff;
    font-size: 28px;
    margin-top: 16px;
    display: none;
  }
  #restart-hint {
    color: #b4b4b4;
    font-size: 20px;
    margin-top: 24px;
    display: none;
  }
  #ui-overlay.active #game-over-text,
  #ui-overlay.active #final-score,
  #ui-overlay.active #restart-hint { display: block; }

  @media (max-width: 1020px) {
    canvas { max-width: 98vw; height: auto; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  <div id="ui-overlay">
    <div id="game-over-text">游戏结束</div>
    <div id="final-score"></div>
    <div id="restart-hint">按 R 或点击此处重新开始</div>
  </div>
</div>

<script>
(function() {
  const CELL = 20;
  const COLS = 50;
  const ROWS = 40;
  const W = COLS * CELL;
  const H = ROWS * CELL;
  const MOVE_INTERVAL = 120;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;

  const overlay = document.getElementById('ui-overlay');
  const goText = document.getElementById('game-over-text');
  const finalScore = document.getElementById('final-score');
  const restartHint = document.getElementById('restart-hint');

  const UP = [0, -1], DOWN = [0, 1], LEFT = [-1, 0], RIGHT = [1, 0];

  let snake, food, direction, nextDir, score, growing, gameOver, moveAcc, lastTime;

  function init() {
    const cx = (COLS / 2) | 0, cy = (ROWS / 2) | 0;
    snake = [[cx, cy], [cx-1, cy], [cx-2, cy]];
    direction = RIGHT;
    nextDir = RIGHT;
    score = 0;
    growing = false;
    gameOver = false;
    moveAcc = 0;
    lastTime = null;
    spawnFood();
    overlay.classList.remove('active');
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s[0] + ',' + s[1]));
    let pos;
    do {
      pos = [(Math.random() * COLS) | 0, (Math.random() * ROWS) | 0];
    } while (occupied.has(pos[0] + ',' + pos[1]));
    food = pos;
  }

  function setDirection(d) {
    if (d[0] + direction[0] !== 0 || d[1] + direction[1] !== 0) {
      nextDir = d;
    }
  }

  function move() {
    direction = nextDir;
    const head = snake[0];
    const nx = (head[0] + direction[0] + COLS) % COLS;
    const ny = (head[1] + direction[1] + ROWS) % ROWS;

    if (snake.some(s => s[0] === nx && s[1] === ny)) {
      gameOver = true;
      overlay.classList.add('active');
      finalScore.textContent = '最终得分: ' + score;
      return;
    }

    snake.unshift([nx, ny]);
    if (growing) {
      growing = false;
    } else {
      snake.pop();
    }

    if (nx === food[0] && ny === food[1]) {
      growing = true;
      score += 10;
      spawnFood();
    }
  }

  function drawGrid() {
    ctx.strokeStyle = '#1e1e28';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x += CELL) {
      ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += CELL) {
      ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5); ctx.stroke();
    }
  }

  function drawSnake() {
    snake.forEach((s, i) => {
      const x = s[0] * CELL, y = s[1] * CELL;
      ctx.fillStyle = i === 0 ? '#50c850' : '#32a032';
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, CELL - 2, CELL - 2, 4);
      ctx.fill();
    });
  }

  function drawFood() {
    const cx = food[0] * CELL + CELL / 2;
    const cy = food[1] * CELL + CELL / 2;
    ctx.fillStyle = '#dc3c3c';
    ctx.beginPath();
    ctx.arc(cx, cy, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawScore() {
    ctx.fillStyle = '#c8c8c8';
    ctx.font = 'bold 20px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('得分: ' + score, W - 20, 26);
  }

  function render() {
    ctx.fillStyle = '#14141e';
    ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawSnake();
    drawFood();
    drawScore();
  }

  function loop(ts) {
    if (lastTime === null) lastTime = ts;
    const dt = Math.min(ts - lastTime, 500); // cap to avoid spiral after tab switch
    lastTime = ts;
    if (!gameOver) {
      moveAcc += dt;
      while (moveAcc >= MOVE_INTERVAL) {
        moveAcc -= MOVE_INTERVAL;
        move();
        if (gameOver) break;
      }
    }
    render();
    requestAnimationFrame(loop);
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (gameOver) {
      if (e.key === 'r' || e.key === 'R') { e.preventDefault(); init(); }
      return;
    }
    switch (e.key) {
      case 'w': case 'W': case 'ArrowUp':    e.preventDefault(); setDirection(UP); break;
      case 's': case 'S': case 'ArrowDown':  e.preventDefault(); setDirection(DOWN); break;
      case 'a': case 'A': case 'ArrowLeft':  e.preventDefault(); setDirection(LEFT); break;
      case 'd': case 'D': case 'ArrowRight': e.preventDefault(); setDirection(RIGHT); break;
    }
  });

  // Touch / click restart
  overlay.addEventListener('click', () => {
    if (gameOver) init();
  });

  // Touch swipe controls
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    if (gameOver) { init(); return; }
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 15) return;
    if (absDx > absDy) {
      setDirection(dx > 0 ? RIGHT : LEFT);
    } else {
      setDirection(dy > 0 ? DOWN : UP);
    }
    touchStart = null;
  });

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
